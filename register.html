    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet" />

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
</head>

<body>

    <!-- HEADER -->
    <section id="header">
          <a href="index.html" class="logo">
            <img src="images/logo.png" alt="Logo" />
          </a>

          <div>
            <ul id="navbar">
              <li><a class="active" href="index.html">Home</a></li>
              <li><a href="shop.html">Shop</a></li>
              <li><a href="blog.html">Blog</a></li>
              <li><a href="about.html">About</a></li>
              <li><a href="try-on.html">Try-On</a></li>
              <li><a href="community.html">Community</a></li>
              <li><a href="promotions.html">Promotions</a></li>

              <!-- Right Side Icons -->
              <li class="nav-icon">
                <a href="contact.html" aria-label="Contact">
                  <i class="ri-customer-service-2-line"></i>
                </a>
              </li>

              <li class="nav-icon">
                <a href="login.html" aria-label="Login">
                  <i class="ri-user-3-line"></i>
                </a>
              </li>

              <li class="nav-icon">
                <a href="cart.html" id="lg-bag" aria-label="Cart">
                  <i class="ri-shopping-bag-4-line"></i>
                </a>
              </li>

              <li class="nav-icon">
                <button
                  class="theme-toggle"
                  id="themeToggle"
                  aria-label="Toggle dark mode"
                >
                  <i class="ri-moon-line" id="themeIcon"></i>
                </button>
              </li>

              <a
                href="#"
                id="close"
                aria-label="Close menu"
                aria-hidden="false"
              >
                <i class="fa-solid fa-xmark"></i>
              </a>
            </ul>
          </div>

          <!-- Mobile Navbar -->
          <div class="mobile">
            <a href="login.html" aria-label="Login">
              <i class="ri-user-3-line"></i>
            </a>

            <a href="cart.html" aria-label="Cart">
              <i class="ri-shopping-bag-4-line"></i>
            </a>

            <i
              class="fas fa-outdent"
              id="bar"
              role="button"
              aria-label="Open menu"
              aria-expanded="false"
              tabindex="0"
            ></i>
          </div>
        </section>

    <!-- REGISTER SECTION -->
    <section id="register-section">

        <div class="auth-card">

            <h2>Register</h2>

            <p class="subtitle">
                Create your account 😊
            </p>

            <form id="registerForm" novalidate>
                <!-- FULL NAME -->
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text"
                        id="registerUsername"
                        placeholder="Enter your full name" required>
                </div>

                <!-- EMAIL -->
                <div class="form-group">
                    <label>Email</label>
                    <input type="email"
                        id="registerEmail"
                        placeholder="Enter your email" required>
                </div>

                <!-- PASSWORD -->
                <div class="form-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password"
                            placeholder="Enter your password"
                            id="registerPassword" required>
                        <i class="ri-eye-line toggle-eye"></i>
                    </div>
                </div>

                <!-- CONFIRM PASSWORD -->
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password"
                            placeholder="Confirm your password"
                            id="confirmPassword" required>
                        <i class="ri-eye-line toggle-eye"></i>
                    </div>
                </div>

                <!-- BUTTON -->
                <button type="submit" class="btn-primary">
                    CREATE ACCOUNT
                </button>
            </form>

            <!-- LOGIN LINK -->
            <div class="switch-auth">

                Already have an account?

                <a href="login.html">
                    Login
                </a>

            </div>

        </div>

    </section>

    <script src="app.js"></script>
    <script src="register.js"></script>
    <script>
    const toggleEyes = document.querySelectorAll(".toggle-eye");

    toggleEyes.forEach((eye) => {

        eye.addEventListener("click", () => {

            const passwordInput = eye.previousElementSibling;

            if (passwordInput.type === "password") {

                passwordInput.type = "text";

                eye.classList.remove("ri-eye-line");
                eye.classList.add("ri-eye-off-line");

            } else {

                passwordInput.type = "password";

                eye.classList.remove("ri-eye-off-line");
                eye.classList.add("ri-eye-line");
            }

        });

    });
</script>

    <script src="app.js?v=1779120917218"></script>
    <script src="register.js"></script>
</body>

</html>
